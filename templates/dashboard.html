{% extends "base.html" %}

{% block content %}

<h1>OSINT Dashboard</h1>

<div class="grid">

<div class="card">

<h3>Username Search</h3>

<input id="username">

<button onclick="usernameSearch()">Search</button>

</div>

<div class="card">

<h3>IP Lookup</h3>

<input id="ip">

<button onclick="ipSearch()">Search</button>

</div>

<div class="card">

<h3>Phone Lookup</h3>

<input id="phone">

<button onclick="phoneSearch()">Search</button>

</div>

<div class="card">

<h3>Domain WHOIS</h3>

<input id="domain">

<button onclick="domainSearch()">Search</button>

</div>

<div class="card">

<h3>Email Lookup</h3>

<input id="email">

<button onclick="emailSearch()">Search</button>

</div>

</div>

<pre id="results"></pre>

{% endblock %}
